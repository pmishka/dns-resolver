apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-resolver
  namespace: house-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dns-resolver
  template:
    metadata:
      labels:
        app: dns-resolver
    spec:
      containers:
        - name: dns-resolver
          image: mikhailpyrochkin/dns-resolver:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: dns-resolver-config
            - secretRef:
                name: mikrotik-parser-secrets
          volumeMounts:
            - name: dns-resolver-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: dns-resolver-data
          persistentVolumeClaim:
            claimName: dns-resolver-data
